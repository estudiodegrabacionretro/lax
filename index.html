<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Táctico LAX</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #ccdbe3; }
        #emoji-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); max-width: 90%; max-height: 180px;
            overflow-y: auto; z-index: 1000; border: 1px solid #999;
        }
        .category-title { font-weight: bold; font-size: 11px; color: #444; display: block; margin-top: 5px; text-transform: uppercase; }
        .emoji-item { cursor: pointer; font-size: 24px; padding: 5px; display: inline-block; }
        .emoji-item:hover { background: #eee; border-radius: 5px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="emoji-panel"></div>

<script>
const EMOJI_CATS = [
    { label: 'TOP', emojis: ['🔥','⚠️','📍','🐾','🦌','💧','🏠','🚨','✅','❌','🆘'] },
    { label: 'ANIMALES', emojis: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🦅','🦆','🦢','🦉','🐺','🐗','🐴','🦄','🐝','🦋','🐢','🐍','🦎','🐙','🦑','🦐','🦀','🐡','🐠','🐟','🐬','🐳','🐋','🦈','🐊','🐅','🐆','🦓','🦍','🐘','🦛','🦏','🐪','🐫','🦒','🦘','🐃','🐂','🐄','🐎','🐖','🐏','🐑','🐐','🦌','🐕','🐈','🐓','🦃','🦢','🐇','🦝','🦨','🦡','🦦','🦥','🐁','🐀','🐿️','🦔'] },
    { label: 'COMIDA', emojis: ['🍎','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥑','🥝','🍅','🫒','🍆','🥔','🥕','🌽','🌶️','🫑','🥦','🧄','🧅','🥜','🍞','🥐','🥖','🥨','🧀','🥚','🍳','🧈','🥞','🧇','🥓','🥩','🍗','🍖','🌭','🍔','🍟','🍕','🌮',' burrito','🥙','🍿','🧂','🍱','🍙','🍚','🍛','🍜','🍝','🍠','🍣','🍤','🥟','🍦','🍧','🍨','🍩','🍪','🎂','🍰','🧁','🥧','🍫','🍬','🍭','🍮','🍯','🍼','🥛','☕','🍵','🧃','🥤','🍶','🍺','🍻','🥂','🍷','🥃','🍸','🍹','🍾'] }
];

let map;
let selectedEmoji = '📍';

function initMap() {
    // Inicializar Leaflet con OpenStreetMap
    map = L.map('map').setView([29.089, -110.961], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const panel = document.getElementById('emoji-panel');
    EMOJI_CATS.forEach(cat => {
        const title = document.createElement('span');
        title.className = 'category-title';
        title.innerText = cat.label;
        panel.appendChild(title);

        cat.emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.className = 'emoji-item';
            span.innerText = emoji;
            span.onclick = () => { selectedEmoji = emoji; };
            panel.appendChild(span);
        });
    });

    map.on('click', function(e) {
        const icon = L.divIcon({
            html: `<div style="font-size: 24px;">${selectedEmoji}</div>`,
            className: 'custom-div-icon',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });
        L.marker([e.latlng.lat, e.latlng.lng], { icon: icon }).addTo(map);
    });
}

window.onload = initMap;
</script>
</body>
</html>
