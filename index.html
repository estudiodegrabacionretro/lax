<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA X - ATOMIC</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100%; width: 100%; background: #111; z-index: 1; }
        
        .search-bar { position: absolute; top: 10px; left: 5%; width: 90%; z-index: 1000; }
        #addr-search { width: 100%; padding: 15px; border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-size: 16px; outline: none; }
        
        .btn-x { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 75px; height: 75px; border-radius: 50%; background: #0f172a; color: white; border: 3px solid #3b82f6; font-size: 2rem; z-index: 1000; font-weight: bold; }
        
        .user-loc { width: 12px; height: 12px; background: #3b82f6; border: 2px solid #fff; border-radius: 50%; }
        
        #panel { position: fixed; bottom: -100%; left: 0; width: 100%; height: 50%; background: #fff; z-index: 2000; transition: 0.4s; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; }
        #panel.open { bottom: 0; }
        #emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; overflow-y: auto; font-size: 2rem; text-align: center; }
        
        /* Estilo Nube */
        .marker-cluster-custom { background: #0f172a; border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="search-bar">
        <input type="text" id="addr-search" placeholder="🔍 Buscar lugar...">
    </div>

    <div id="map"></div>

    <button class="btn-x" onclick="togglePanel()">X</button>

    <div id="panel">
        <div style="width:50px; height:5px; background:#ddd; margin:10px auto; border-radius:5px" onclick="togglePanel()"></div>
        <div id="emoji-grid">
            <span onclick="put('🔥')">🔥</span> <span onclick="put('⚠️')">⚠️</span> <span onclick="put('🚔')">🚔</span> <span onclick="put('🍕')">🍕</span> <span onclick="put('🍺')">🍺</span>
            <span onclick="put('🐾')">🐾</span> <span onclick="put('🌲')">🌲</span> <span onclick="put('🏠')">🏠</span> <span onclick="put('📍')">📍</span> <span onclick="put('🛑')">🛑</span>
            <span onclick="put('💀')">💀</span> <span onclick="put('🎉')">🎉</span> <span onclick="put('💎')">💎</span> <span onclick="put('🛠️')">🛠️</span> <span onclick="put('🚗')">🚗</span>
        </div>
    </div>

    <script>
        const _U = "https://echdpjhzjsaqtvdrkgaj.supabase.co", 
              _K = "sb_publishable_j_v0LqOm9jcYqh4NAH9IDg_dVoOVi8s", 
              _S = supabase.createClient(_U, _K);

        let map, userPos, cluster, active = new Set();

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([29.4, -110.9], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            cluster = L.markerClusterGroup({
                maxClusterRadius: 40,
                iconCreateFunction: (c) => L.divIcon({ html: '<div>'+c.getChildCount()+'</div>', className: 'marker-cluster-custom', iconSize: [35,35] })
            });
            map.addLayer(cluster);

            map.locate({ watch: true, enableHighAccuracy: true });
            map.on('locationfound', e => {
                userPos = e.latlng;
                if (!window.uM) window.uM = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-loc' }) }).addTo(map);
                else window.uM.setLatLng(e.latlng);
            });

            // Buscador Directo
            document.getElementById('addr-search').addEventListener('keypress', async (e) => {
                if(e.key === 'Enter') {
                    const r = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(e.target.value)}&limit=1`);
                    const d = await r.json();
                    if(d.features.length) map.flyTo([d.features[0].geometry.coordinates[1], d.features[0].geometry.coordinates[0]], 17);
                }
            });

            load();
            setInterval(load, 10000);
        }

        function togglePanel() { 
            if(userPos) map.panTo(userPos);
            document.getElementById('panel').classList.toggle('open'); 
        }

        async function put(emoji) {
            if(!userPos) return alert("Buscando señal GPS...");
            const { error } = await _S.from('marcas').insert([{ 
                emoji, latitud: userPos.lat, longitud: userPos.lng, 
                expira_en: new Date(Date.now() + 259200000).toISOString() 
            }]);
            if(!error) { load(); togglePanel(); } else { alert("Error de Base de Datos"); }
        }

        async function load() {
            const { data } = await _S.from('marcas').select('*').gt('expira_en', new Date().toISOString());
            if(data) {
                let batch = [];
                data.forEach(m => {
                    if(!active.has(m.id)) {
                        batch.push(L.marker([m.latitud, m.longitud], { icon: L.divIcon({ html: '<div style="font-size:25px">'+m.emoji+'</div>', className: 'p' }) }));
                        active.add(m.id);
                    }
                });
                if(batch.length) cluster.addLayers(batch);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
