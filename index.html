        #map { position: absolute; inset: 0; z-index: 1; background: #111; }

        /* Bot√≥n LA X */
        #btn-x {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background: #007bff; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: bold; cursor: pointer; z-index: 10;
            box-shadow: 0 0 20px rgba(0,123,255,0.5); border: 3px solid #fff;
            transition: 0.2s;
        }
        #btn-x:active { transform: translateX(-50%) scale(0.9); }

        /* Panel Deslizable estilo WhatsApp */
        #emoji-container {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #1c1c1e; z-index: 20; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 20px 20px 0 0; display: flex; flex-direction: column;
            color: white; box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
        }
        #emoji-container.active { bottom: 0; }

        .handle { width: 40px; height: 5px; background: #3a3a3c; border-radius: 10px; margin: 10px auto; flex-shrink: 0; }
        
        #search-box { padding: 5px 15px 10px; }
        #emoji-search {
            width: 100%; padding: 10px; border-radius: 10px; border: none;
            background: #2c2c2e; color: white; font-size: 16px; box-sizing: border-box;
        }

        #tabs {
            display: flex; overflow-x: auto; padding: 5px 10px; gap: 8px;
            border-bottom: 1px solid #2c2c2e; scrollbar-width: none; flex-shrink: 0;
        }
        #tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 6px 14px; border-radius: 15px; background: #2c2c2e;
            white-space: nowrap; cursor: pointer; font-size: 14px; color: #8e8e93;
        }
        .tab.active { background: #007bff; color: white; }

        #emoji-list {
            flex: 1; overflow-y: auto; padding: 15px;
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
            align-content: start;
        }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; transition: 0.1s; }
        .emoji-item:active { transform: scale(1.3); }

        .custom-div-icon { background: none; border: none; text-align: center; }
    </style>
