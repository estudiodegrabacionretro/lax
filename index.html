<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA X - ORGANISMO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Estética Base */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; }
        
        /* Contenedor del Organismo X */
        #organismo-x {
            position: fixed;
            bottom: 50px; /* Posición ergonómica para el pulgar */
            left: 50%;
            transform: translateX(-50%);
            width: 80px; 
            height: 80px;
            z-index: 999;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* La X Corpórea y su Respiración */
        .la-x-primordial {
            position: relative;
            width: 50px;
            height: 50px;
            animation: respirar-x 3s ease-in-out infinite;
        }

        /* Las dos barras de la X */
        .la-x-primordial::before,
        .la-x-primordial::after {
            content: '';
            position: absolute;
            background: #ff0000;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        /* Barra 1 */
        .la-x-primordial::before {
            top: 0; left: 22px;
            width: 6px; height: 50px;
            transform: rotate(45deg);
        }

        /* Barra 2 */
        .la-x-primordial::after {
            top: 22px; left: 0;
            width: 50px; height: 6px;
            transform: rotate(45deg);
        }

        @keyframes respirar-x {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8)); }
        }

        /* Limpieza de Leaflet */
        .leaflet-control-attribution { display: none !important; }
        .leaflet-container { background: #000 !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="organismo-x">
        <div class="la-x-primordial"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://echdpjhzjsaqtvdrkgaj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjaGRwamh6anNhcXR2ZHJrZ2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTA2NTYsImV4cCI6MjA4ODk4NjY1Nn0.8_E_jXsoA8JSgQ-PSNRNc-vqePqFeEDWHiy5YFgc8oo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map;

        async function init() {
            // Mapa modo oscuro
            map = L.map('map', { 
                zoomControl: false,
                center: [23.6, -102.5],
                zoom: 5
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Cargar marcas previas
            const { data: marcas } = await _supabase.from('marcas').select('*');
            if (marcas) {
                marcas.forEach(m => estamparEnMapa(m.latitud, m.longitud, m.emoji));
            }

            // GATILLO: Al tocar la X
            document.getElementById('organismo-x').addEventListener('click', async () => {
                const emoji = prompt("¿Qué pictograma vas a estampar?");
                
                if (emoji && emoji.trim() !== "") {
                    const centro = map.getCenter();
                    estamparEnMapa(centro.lat, centro.lng, emoji);
                    
                    await _supabase.from('marcas').insert([
                        { latitud: centro.lat, longitud: centro.lng, emoji: emoji }
                    ]);
                }
            });

            // GPS inicial
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    map.setView([p.coords.latitude, p.coords.longitude], 16);
                });
            }
        }

        function estamparEnMapa(lat, lng, emoji) {
            L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'sello',
                    html: `<div style="font-size:40px; transform: translate(-50%, -50%);">${emoji}</div>`,
                    iconSize: [0, 0]
                })
            }).addTo(map);
        }

        window.onload = init;
    </script>
</body>
</html>
