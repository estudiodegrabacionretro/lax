<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Colmena de Expresión</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #000; }

        /* EL ORGANISMO X */
        #organismo-x {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }
        #organismo-x.bloqueado { pointer-events: none; opacity: 0.3; }
        #organismo-x.listo { pointer-events: auto; opacity: 1; cursor: pointer; }

        .la-x-primordial { position: relative; width: 50px; height: 50px; }
        .la-x-primordial::before, .la-x-primordial::after {
            content: ''; position: absolute; background: #ff0000; border-radius: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }
        .la-x-primordial::before { top: 0; left: 22px; width: 6px; height: 50px; transform: rotate(45deg); }
        .la-x-primordial::after { top: 22px; left: 0; width: 50px; height: 6px; transform: rotate(45deg); }
        .listo .la-x-primordial { animation: respirar-x 3s ease-in-out infinite; }

        /* CONSOLA */
        #consola {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px); border-radius: 40px 40px 0 0;
            z-index: 1000; transition: bottom 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #consola.abierta { bottom: 0; }
        .btn-cerrar { color: #ff0000; font-size: 35px; cursor: pointer; padding: 20px; text-align: right; }

        .emoji-grid {
            flex: 1; display: grid; grid-template-columns: repeat(8, 1fr);
            gap: 5px; padding: 0 10px 20px 10px; overflow-y: auto;
        }
        .emoji-item { font-size: 34px; text-align: center; cursor: pointer; padding: 8px 0; }
        
        .consola-nav {
            height: 95px; display: flex; justify-content: space-around;
            align-items: center; background: rgba(255, 255, 255, 0.05);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab { font-size: 35px; opacity: 0.3; transition: 0.3s; }
        .nav-tab.active { opacity: 1; transform: scale(1.2); }

        /* EL PANAL ÁMBAR */
        .panal-miel {
            background: rgba(255, 170, 0, 0.85);
            border: 2px solid #ffaa00;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 160, 0, 0.5);
            font-size: 16px;
        }

        @keyframes respirar-x { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        #halo-nebulosa {
            position: absolute; width: 85px; height: 85px; border-radius: 50%;
            border: 2px solid transparent; border-top: 3px solid #ff0000;
            animation: girar 0.8s linear infinite;
        }
        @keyframes girar { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="organismo-x" class="bloqueado">
        <div id="halo-nebulosa"></div>
        <div class="la-x-primordial"></div>
    </div>

    <div id="consola">
        <div class="btn-cerrar" onclick="cerrarConsola()">✕</div>
        <div class="emoji-grid" id="grid-emojis"></div>
        <div class="consola-nav" id="nav-tabs"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://echdpjhzjsaqtvdrkgaj.supabase.co";
        const SUPABASE_KEY = "TU_KEY_AQUI"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, clusterColmena, userPos = null;

        const CATEGORIAS = {
            "c1": ['😀','👽','🛸','👻','💀','👾','🤖','🎃','🛰️','🚀'],
            "c2": ['🐶','🐱','🐻','🦊','🦁','🐯','🐼','🐮','🐷','🐸'],
            "c3": ['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🎱','🏓','🏸'],
            "c4": ['🚗','🚕','🚙','🚌','🏎️','🚓','🚑','🚒','🚐','🏍️'],
            "c5": ['❤️','🔥','🌟','🌈','🚩','🇲🇽','🇪🇨','🇺🇸','🇪🇸','🇮🇹']
        };

        async function init() {
            map = L.map('map', { zoomControl: false, center: [0, 0], zoom: 2 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            // Lógica de Colmena y Dispersión
            clusterColmena = L.markerClusterGroup({
                iconCreateFunction: function(cluster) {
                    return L.divIcon({ 
                        html: `<span>${cluster.getChildCount()}</span>`, 
                        className: 'panal-miel', iconSize: L.point(45, 45) 
                    });
                },
                // spiderfyOnMaxZoom: true hace que se abran en abanico si están muy juntos
                spiderfyOnMaxZoom: true, 
                showCoverageOnHover: false,
                maxClusterRadius: 40 // Define qué tan pronto se agrupan
            });
            map.addLayer(clusterColmena);

            obtenerUbicacion(true);
            await cargarMarcasVivas();

            document.getElementById('organismo-x').onclick = () => {
                // Cada vez que tocas la X, actualizamos tu GPS y te centramos
                obtenerUbicacion(false);
                document.getElementById('consola').classList.add('abierta');
                cambiarCategoria('c1');
            };

            // Crear Nav Tabs
            const nav = document.getElementById('nav-tabs');
            Object.keys(CATEGORIAS).forEach((cat, i) => {
                const tab = document.createElement('div');
                tab.className = `nav-tab ${i===0?'active':''}`;
                tab.innerHTML = CATEGORIAS[cat][0];
                tab.onclick = (e) => {
                    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
                    tab.classList.add('active');
                    cambiarCategoria(cat);
                };
                nav.appendChild(tab);
            });
        }

        function obtenerUbicacion(primeraVez) {
            navigator.geolocation.getCurrentPosition(p => {
                userPos = [p.coords.latitude, p.coords.longitude];
                if(primeraVez) map.flyTo(userPos, 16);
                else map.setView(userPos, 18); // Te ancla a tu sitio antes de marcar
                document.getElementById('organismo-x').classList.replace('bloqueado', 'listo');
                document.getElementById('halo-nebulosa').style.display = 'none';
            }, null, { enableHighAccuracy: true });
        }

        async function cargarMarcasVivas() {
            const { data } = await _supabase.from('marcas').select('*').gt('expira_at', new Date().toISOString());
            if (data) {
                clusterColmena.clearLayers();
                data.forEach(m => estamparEnMapa(m.latitud, m.longitud, m.emoji));
            }
        }

        async function seleccionarEmoji(emoji) {
            if(!userPos) return;
            cerrarConsola();
            
            const horasAzar = Math.floor(Math.random() * (72 - 6 + 1)) + 6;
            const expira = new Date();
            expira.setHours(expira.getHours() + horasAzar);

            estamparEnMapa(userPos[0], userPos[1], emoji);

            await _supabase.from('marcas').insert([{ 
                latitud: userPos[0], longitud: userPos[1], 
                emoji: emoji, expira_at: expira.toISOString() 
            }]);
        }

        function estamparEnMapa(lat, lng, emoji) {
            const m = L.marker([lat, lng], {
                icon: L.divIcon({ 
                    className: 'sello', 
                    html: `<div style="font-size:40px; transform:translate(-20px,-20px)">${emoji}</div>`, 
                    iconSize: [0, 0] 
                })
            });
            clusterColmena.addLayer(m);
        }

        function cambiarCategoria(cat) {
            const grid = document.getElementById('grid-emojis');
            grid.innerHTML = CATEGORIAS[cat].map(e => `<div class="emoji-item" onclick="seleccionarEmoji('${e}')">${e}</div>`).join('');
        }

        function cerrarConsola() { document.getElementById('consola').classList.remove('abierta'); }

        window.onload = init;
    </script>
</body>
</html>
