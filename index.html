    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; background: #000; }

        #organismo-x {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }
        #organismo-x.bloqueado { pointer-events: none; opacity: 0.3; }
        #organismo-x.listo { pointer-events: auto; opacity: 1; cursor: pointer; }

        .la-x-primordial { position: relative; width: 50px; height: 50px; }
        .la-x-primordial::before, .la-x-primordial::after {
            content: ''; position: absolute; background: #ff0000; border-radius: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }
        .la-x-primordial::before { top: 0; left: 22px; width: 6px; height: 50px; transform: rotate(45deg); }
        .la-x-primordial::after { top: 22px; left: 0; width: 50px; height: 6px; transform: rotate(45deg); }
        .listo .la-x-primordial { animation: respirar-x 3s ease-in-out infinite; }

        #consola {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px); border-radius: 40px 40px 0 0;
            z-index: 1000; transition: bottom 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #consola.abierta { bottom: 0; }

        .consola-header { padding: 20px 25px 10px 25px; display: flex; justify-content: flex-end; }
        .btn-cerrar { color: #ff0000; font-size: 35px; cursor: pointer; opacity: 0.8; line-height: 1; }

        .emoji-grid {
            flex: 1; display: grid; grid-template-columns: repeat(8, 1fr);
            gap: 5px; padding: 0 10px 20px 10px; overflow-y: auto; align-content: start;
            scrollbar-width: none;
        }
        .emoji-grid::-webkit-scrollbar { display: none; }
        .emoji-item {
            font-size: 34px; text-align: center; cursor: pointer; padding: 8px 0;
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .emoji-item:active { transform: scale(1.5); }

        .consola-nav {
            height: 95px; display: flex; justify-content: space-around;
            align-items: center; background: rgba(255, 255, 255, 0.02);
            padding-bottom: env(safe-area-inset-bottom);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nav-tab { font-size: 38px; cursor: pointer; opacity: 0.2; transition: 0.3s; padding: 10px; }
        .nav-tab.active { opacity: 1; transform: scale(1.15); filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }

        .panal-miel {
            background: rgba(255, 174, 0, 0.8);
            border: 2px solid #ffaa00;
            border-radius: 50%;
            color: #000;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 166, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        @keyframes girar-nebulosa { 100% { transform: rotate(360deg); } }
        #halo-nebulosa {
            position: absolute; width: 85px; height: 85px; border-radius: 50%;
            border: 2px solid transparent; border-top: 3px solid #ff0000;
            animation: girar-nebulosa 0.8s linear infinite;
        }
        @keyframes respirar-x { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    </style>
</head>

                showCoverageOnHover: false,
                maxClusterRadius: 45, // QuГ© tan cerca se agrupan
                disableClusteringAtZoom: 18 // Muy cerca se ven sueltos
            });
            map.addLayer(clusterColmena);

            await cargarMarcasVivas();
            obtenerGPS(true);

            document.getElementById('organismo-x').onclick = () => {
                obtenerGPS(false);
                document.getElementById('consola').classList.add('abierta');
                cambiarCategoria('c1', document.querySelector('.nav-tab'));
            };
        }

        function obtenerGPS(fly) {
            navigator.geolocation.getCurrentPosition(p => {
                userPos = [p.coords.latitude, p.coords.longitude];
                if(fly) map.flyTo(userPos, 16); 
                else map.setView(userPos, 18);
                document.getElementById('halo-nebulosa').style.display = 'none';
                document.getElementById('organismo-x').classList.replace('bloqueado', 'listo');
            }, null, { enableHighAccuracy: true });
        }

        async function cargarMarcasVivas() {
            const ahora = new Date().toISOString();
            const { data } = await _supabase.from('marcas').select('*').gt('expira_at', ahora);
            if (data) {
                clusterColmena.clearLayers();
                data.forEach(m => estamparEnMapa(m.latitud, m.longitud, m.emoji));
            }
        }

        function cambiarCategoria(cat, elemento) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            elemento.classList.add('active');
            const grid = document.getElementById('grid-emojis');
            const listaLimpia = [...new Set(BIBLIOTECA[cat])];
            grid.innerHTML = listaLimpia.map(e => `<div class="emoji-item" onclick="seleccionarEmoji('${e}')">${e}</div>`).join('');
            grid.scrollTop = 0;
        }

        async function seleccionarEmoji(emoji) {
            if(!userPos) return;
            cerrarConsola();
            
            // ErosiГіn aleatoria: 6h a 72h
            const horasAzar = Math.floor(Math.random() * (72 - 6 + 1)) + 6;
            const expira = new Date();
            expira.setHours(expira.getHours() + horasAzar);

            estamparEnMapa(userPos[0], userPos[1], emoji);

            await _supabase.from('marcas').insert([{ 
                latitud: userPos[0], 
                longitud: userPos[1], 
                emoji: emoji, 
                expira_at: expira.toISOString() 
            }]);
        }

        function estamparEnMapa(lat, lng, emoji) {
            const marcador = L.marker([lat, lng], {
                icon: L.divIcon({ 
                    className: 'sello', 
                    html: `<div style="font-size:45px; transform: translate(-22px, -22px);">${emoji}</div>`, 
                    iconSize: [0, 0] 
                })
            });
            clusterColmena.addLayer(marcador);
        }

        function cerrarConsola() { document.getElementById('consola').classList.remove('abierta'); }
        window.onload = init;
    </script>
</body>
</html>
