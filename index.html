        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* El mapa ahora ocupa todo sin interrupciones */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #111; }

        .btn-main { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 85px; height: 85px; border-radius: 50%; background: #0f172a; 
            color: white; font-size: 2.5rem; z-index: 2000; border: 4px solid #3b82f6; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: flex; align-items: center; 
            justify-content: center; font-weight: bold; cursor: pointer; 
        }

        #emoji-container {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #16213e; z-index: 6000;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 24px 24px 0 0;
            display: flex; flex-direction: column;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.8);
        }
        #emoji-container.active { bottom: 0; }

        .panel-handle { width: 44px; height: 5px; background: #2e4070; border-radius: 3px; margin: 12px auto 8px; flex-shrink: 0; }

        #cat-tabs {
            display: flex; overflow-x: auto; padding: 10px;
            border-bottom: 1px solid #1e3060; gap: 20px; scrollbar-width: none;
        }
        #cat-tabs::-webkit-scrollbar { display: none; }
        .cat-tab { font-size: 1.6rem; cursor: pointer; opacity: 0.5; padding-bottom: 8px; flex-shrink: 0; }
        .cat-tab.active { opacity: 1; border-bottom: 3px solid #3b82f6; }

        #emoji-scroll { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
        .emoji-item { font-size: 2.2rem; text-align: center; padding: 10px 0; cursor: pointer; user-select: none; }

        .user-dot { width: 18px; height: 18px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px #3b82f6; }
        .marker-cluster-custom { background: #0f172a; border: 2px solid #3b82f6; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        function init() {
            // InicializaciГіn forzada del mapa
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([29.4, -110.9], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            clusterGroup = L.markerClusterGroup({
                maxClusterRadius: 35,
                iconCreateFunction: (c) => L.divIcon({ html: '<div>'+c.getChildCount()+'</div>', className: 'marker-cluster-custom', iconSize: [40,40] })
            });
            map.addLayer(clusterGroup);

            renderTabs();
            renderEmojis('Top');

            map.locate({ setView: false, watch: true, enableHighAccuracy: true });
            map.on('locationfound', e => {
                userPos = e.latlng;
                if (!userMarker) userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-dot' }) }).addTo(map);
                else userMarker.setLatLng(e.latlng);
                if (isFirstLoad) { map.flyTo(e.latlng, 16); isFirstLoad = false; }
            });

            loadData();
            setInterval(loadData, 12000);
        }

        function renderTabs() {
            const tabs = document.getElementById('cat-tabs');
            EMOJI_CATS.forEach((cat, i) => {
                const span = document.createElement('span');
                span.className = 'cat-tab' + (i === 0 ? ' active' : '');
                span.innerText = cat.icon;
                span.onclick = () => {
                    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                    span.classList.add('active');
                    renderEmojis(cat.label);
                };
                tabs.appendChild(span);
            });
        }

        function renderEmojis(category) {
            const grid = document.getElementById('emoji-grid');
            grid.innerHTML = '';
            const list = EMOJI_CATS.find(c => c.label === category).emojis;

            list.forEach(emoji => {
                const div = document.createElement('div');
                div.className = 'emoji-item';
                div.innerText = emoji;
                div.onclick = () => sendEmoji(emoji);
                grid.appendChild(div);
            });
        }

        function handleX() {
            if (userPos) map.panTo(userPos);
            document.getElementById('emoji-container').classList.add('active');
        }

        function closePanel() { document.getElementById('emoji-container').classList.remove('active'); }

        async function sendEmoji(emoji) {
            if (!userPos) return;
            const { error } = await _S.from('marcas').insert([{
                emoji, latitud: userPos.lat, longitud: userPos.lng,
                expira_en: new Date(Date.now() + 259200000).toISOString()
            }]);
            if (!error) { loadData(); closePanel(); }
        }

        async function loadData() {
            const { data } = await _S.from('marcas').select('*').gt('expira_en', new Date().toISOString());
            if (data) {
                let batch = [];
                data.forEach(m => {
                    if (!activeIds.has(m.id)) {
                        batch.push(L.marker([m.latitud, m.longitud], {
                            icon: L.divIcon({ html: `<div style="font-size:32px">${m.emoji}</div>`, className: 'p' })
                        }));
                        activeIds.add(m.id);
                    }
                });
                if (batch.length) clusterGroup.addLayers(batch);
            }
        }

        window.onload = init;
    </script>
