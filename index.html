<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LA X - AUTOCOMPLETE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <style>
        :root { --accent: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #f1f5f9; }
        #map { position: absolute; inset: 0; z-index: 1; filter: saturate(0.8); }
        
        .user-dot { width: 14px; height: 14px; background: #3b82f6; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.3); }

        /* BUSCADOR CON AUTOCOMPLETE */
        .search-container { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 500px; z-index: 2000; 
        }
        #search-input { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); outline: none; font-size: 16px;
        }
        #autocomplete-results {
            background: white; border-radius: 0 0 15px 15px; margin-top: 2px;
            max-height: 250px; overflow-y: auto; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .result-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 14px; color: #334155; }
        .result-item:last-child { border: none; }
        .result-item:active { background: #f8fafc; }

        /* BOTÓN X */
        .btn-main { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 85px; height: 85px; border-radius: 50%; background: var(--accent); 
            color: white; font-size: 2.5rem; z-index: 1500; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: none;
        }

        /* PANEL EMOJIS */
        #emoji-container {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 60%;
            background: white; z-index: 3000; transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 30px 30px 0 0; display: flex; flex-direction: column;
        }
        #emoji-container.active { bottom: 0; }
        emoji-picker { width: 100%; height: 100%; }
        .handle { width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: 12px auto; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 Buscar cerca de ti..." autocomplete="off">
        <div id="autocomplete-results"></div>
    </div>

    <button id="record-btn" class="btn-main" onclick="openFullPanel()" disabled>X</button>

    <div id="emoji-container">
        <div class="handle" onclick="closeFullPanel()"></div>
        <emoji-picker id="picker" class="light"></emoji-picker>
    </div>

    <script>
        const _U = "https://echdpjhzjsaqtvdrkgaj.supabase.co";
        const _K = "sb_publishable_j_v0LqOm9jcYqh4NAH9IDg_dVoOVi8s";
        const _S = supabase.createClient(_U, _K);

        let map, userPos = null, markers = {}, userMarker = null;
        const searchInput = document.getElementById('search-input');
        const resultsCont = document.getElementById('autocomplete-results');

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([29.4, -110.9], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            map.locate({ setView: true, maxZoom: 18, watch: true, enableHighAccuracy: true });
            
            map.on('locationfound', (e) => {
                userPos = e.latlng;
                document.getElementById('record-btn').disabled = false;
                if (!userMarker) {
                    userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-dot' }) }).addTo(map);
                } else { userMarker.setLatLng(e.latlng); }
            });

            // Lógica de Autocompletado
            searchInput.addEventListener('input', debounce(handleSearch, 300));
            
            document.querySelector('emoji-picker').addEventListener('emoji-click', e => sendEmoji(e.detail.unicode));

            loadData();
            setInterval(loadData, 20000);
        }

        async function handleSearch() {
            const q = searchInput.value;
            if (q.length < 3) { resultsCont.style.display = 'none'; return; }

            // Buscamos usando Photon (OSM) priorizando cercanía al usuario
            let url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5`;
            if (userPos) url += `&lat=${userPos.lat}&lon=${userPos.lng}`;

            const res = await fetch(url);
            const data = await res.json();

            resultsCont.innerHTML = '';
            if (data.features.length > 0) {
                resultsCont.style.display = 'block';
                data.features.forEach(f => {
                    const name = f.properties.name || '';
                    const city = f.properties.city || f.properties.state || '';
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<strong>${name}</strong> <span class="text-slate-400 text-xs">${city}</span>`;
                    div.onclick = () => {
                        const [lon, lat] = f.geometry.coordinates;
                        map.flyTo([lat, lon], 17);
                        resultsCont.style.display = 'none';
                        searchInput.value = name;
                    };
                    resultsCont.appendChild(div);
                });
            } else { resultsCont.style.display = 'none'; }
        }

        function debounce(func, timeout = 300){
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => { func.apply(this, args); }, timeout);
            };
        }

        function openFullPanel() {
            if (userPos) {
                map.flyTo(userPos, 18, { duration: 0.5 });
                document.getElementById('emoji-container').classList.add('active');
            }
        }

        function closeFullPanel() { document.getElementById('emoji-container').classList.remove('active'); }

        async function sendEmoji(emoji) {
            if (!userPos) return;
            const { error } = await _S.from('marcas').insert([{
                emoji, latitud: userPos.lat, longitud: userPos.lng, 
                expira_en: new Date(Date.now() + 259200000).toISOString()
            }]);
            if (!error) { loadData(); closeFullPanel(); }
        }

        async function loadData() {
            const { data } = await _S.from('marcas').select('*').gt('expira_en', new Date().toISOString());
            if (data) {
                data.forEach(m => {
                    if (!markers[m.id]) {
                        markers[m.id] = L.marker([m.latitud, m.longitud], { 
                            icon: L.divIcon({ html: `<div style="font-size:32px">${m.emoji}</div>`, className: 'p' }) 
                        }).addTo(map);
                    }
                });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
