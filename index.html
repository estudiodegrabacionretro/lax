<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro GeogrГЎfico Universal</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; background: #ccdbe3; }
        
        #emoji-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); width: 92%; max-height: 240px;
            overflow-y: auto; z-index: 1000; border: 1px solid #ddd;
        }

        .cat-section { margin-bottom: 15px; }
        .cat-title { font-size: 11px; font-weight: 800; color: #999; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        
        .emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .emoji-item { 
            cursor: pointer; font-size: 28px; width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.1s; border-radius: 12px; user-select: none;
        }
        .emoji-item:hover { transform: scale(1.2); background: #f8f8f8; }
        .emoji-item.active { background: #eee; border: 2px solid #ccc; }

        /* Scrollbar */
        #emoji-panel::-webkit-scrollbar { width: 5px; }
        #emoji-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="emoji-panel"></div>

<script>
// CONFIGURACIГ“N DE TU PROYECTO (Sustituye con tus datos de Supabase)
const SB_URL = 'TU_URL_DE_SUPABASE';
const SB_KEY = 'TU_ANON_KEY_DE_SUPABASE';
const supabase = supabase.createClient(SB_URL, SB_KEY);

const EMOJI_CATS = [
    { t: 'Populares', e: ['вқӨпёҸ','рҹҳӮ','рҹ”Ҙ','рҹ“Қ','вң…','вҡ пёҸ','рҹҶҳ','вңЁ'] },
    { t: 'LatinoamГ©rica', e: ['рҹҮІрҹҮҪ','рҹҮ¬рҹҮ№','рҹҮёрҹҮ»','рҹҮӯрҹҮі','рҹҮірҹҮ®','рҹҮЁрҹҮ·','рҹҮөрҹҮҰ','рҹҮЁрҹҮә','рҹҮ©рҹҮҙ','рҹҮөрҹҮ·','рҹҮЁрҹҮҙ','рҹҮ»рҹҮӘ','рҹҮӘрҹҮЁ','рҹҮөрҹҮӘ','рҹҮ§рҹҮҙ','рҹҮөрҹҮҫ','рҹҮЁрҹҮұ','рҹҮҰрҹҮ·','рҹҮәрҹҮҫ','рҹҮ§рҹҮ·'] },
    { t: 'Gente', e: ['рҹҳҖ','рҹҳҺ','рҹҘі','рҹҘә','рҹҳӯ','рҹҳЎ','рҹ‘Қ','рҹ‘Һ','рҹҷҢ','рҹҷҸ','рҹ’Ә','рҹ§ '] },
    { t: 'Deportes', e: ['вҡҪ','рҹҸҖ','рҹҸҲ','вҡҫ','рҹҺҫ','рҹҸҗ','рҹҺұ','рҹҘҠ','рҹҡҙ','рҹҸҶ','рҹҺ®','рҹҺІ','рҹӣ№'] },
    { t: 'Animales', e: ['рҹҗ¶','рҹҗұ','рҹҰҠ','рҹҰҒ','рҹҗ®','рҹҗ·','рҹҗё','рҹҰ…','рҹҗў','рҹҗі','рҹҗҚ','рҹҰҢ','рҹҗҫ'] },
    { t: 'Comida', e: ['рҹҚҺ','рҹҚ•','рҹҚ”',' taco',' burrito','рҹҘ©','рҹҚә','вҳ•','рҹҚҰ','рҹҚ©'] },
    { t: 'Lugares y Cosas', e: ['рҹҸ ','рҹҸў','рҹҸҘ','рҹҸҰ','рҹҸ«','вӣӘ','рҹҢ…','рҹҸ–пёҸ','рҹҸ”пёҸ','рҹҡ—','вңҲпёҸ','рҹ’Ў','рҹ“ұ','рҹ’°','рҹ”‘','рҹҺҒ'] }
];

let map;
let selectedEmoji = 'рҹ“Қ';

async function init() {
    // Inicializar mapa centrado en el continente
    map = L.map('map').setView([15, -75], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'В© OpenStreetMap'
    }).addTo(map);

    renderPanel();
    await loadMarkers();

    map.on('click', (e) => saveMarker(e.latlng.lat, e.latlng.lng));
}

function renderPanel() {
    const panel = document.getElementById('emoji-panel');
    EMOJI_CATS.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'cat-section';
        div.innerHTML = `<span class="cat-title">${cat.t}</span>`;
        
        const grid = document.createElement('div');
        grid.className = 'emoji-grid';

        cat.e.forEach(emoji => {
            const span = document.createElement('span');
            span.className = 'emoji-item' + (emoji === selectedEmoji ? ' active' : '');
            span.innerText = emoji;
            span.onclick = () => {
                selectedEmoji = emoji;
                document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('active'));
                span.classList.add('active');
            };
            grid.appendChild(span);
        });
        div.appendChild(grid);
        panel.appendChild(div);
    });
}

async function saveMarker(lat, lng) {
    placeMarker(lat, lng, selectedEmoji); // Poner en mapa local
    
    const { error } = await supabase
        .from('marcadores') 
        .insert([{ lat, lng, emoji: selectedEmoji }]);
    
    if (error) console.error('Error al guardar en BD:', error.message);
}

async function loadMarkers() {
    const { data, error } = await supabase.from('marcadores').select('*');
    if (data) {
        data.forEach(m => placeMarker(m.lat, m.lng, m.emoji));
    } else if (error) {
        console.error('Error al cargar:', error.message);
    }
}

function placeMarker(lat, lng, emoji) {
    const icon = L.divIcon({
        html: `<div style="font-size: 30px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));">${emoji}</div>`,
        className: 'custom-marker',
        iconSize: [34, 34],
        iconAnchor: [17, 17]
    });
    L.marker([lat, lng], { icon }).addTo(map);
}

window.onload = init;
</script>
</body>
</html>
