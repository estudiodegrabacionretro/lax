<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LA X - INSTANT EMOJIS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #map { position: absolute; inset: 0; z-index: 1; background: #111; }
        
        .search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 92%; z-index: 5000; }
        #search-input { width: 100%; padding: 16px; border-radius: 15px; border: none; box-shadow: 0 4px 25px rgba(0,0,0,0.3); outline: none; font-size: 16px; }

        .btn-main { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 85px; height: 85px; border-radius: 50%; background: #0f172a; color: white; font-size: 2.5rem; z-index: 2000; border: 4px solid #3b82f6; box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* PANEL DE EMOJIS NATIVO - SOLUCIÓN DEFINITIVA */
        #emoji-container { position: fixed; bottom: -100%; left: 0; width: 100%; height: 65%; background: #f8fafc; z-index: 6000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 30px 30px 0 0; display: flex; flex-direction: column; }
        #emoji-container.active { bottom: 0; }
        
        #emoji-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 15px; 
            padding: 20px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        .emoji-item { 
            font-size: 2.5rem; 
            text-align: center; 
            cursor: pointer; 
            transition: transform 0.1s; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .emoji-item:active { transform: scale(1.3); }

        .user-dot { width: 16px; height: 16px; background: #3b82f6; border: 3px solid white; border-radius: 50%; }
        .marker-cluster-custom { background: #0f172a; border: 2px solid #3b82f6; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 Buscar dirección y Enter..." autocomplete="off">
    </div>

    <button id="record-btn" class="btn-main" onclick="handleX()">X</button>

    <div id="emoji-container">
        <div style="width:50px; height:6px; background:#cbd5e1; margin:15px auto; border-radius:5px" onclick="closePanel()"></div>
        <div id="emoji-grid">
            </div>
    </div>

    <script>
        const _U = "https://echdpjhzjsaqtvdrkgaj.supabase.co", 
              _K = "sb_publishable_j_v0LqOm9jcYqh4NAH9IDg_dVoOVi8s", 
              _S = supabase.createClient(_U, _K);

        let map, userPos, userMarker, clusterGroup, activeIds = new Set();
        let isFirstLoad = true;

        // LISTA DE EMOJIS HARDCODED (Para que salgan SIEMPRE)
        const EMOJI_LIST = [
            '🔥','⚠️','🚔','🚨','🍕','🍺','☕','🌮','🍔','🐾','🌳','🏠','📍','🛑','💀','🎉','💎','🛠️','🚗','🚲','🏃','💃','✨','🌈','⚡','🔥','🔊','❌','✅','❓','🆘','🏥','🏧','🚻','🅿️','🍿','🍦','🍰','🥐','🍳','🍎','🍓','🍇','🍉','🥥','🥑','🥦','🥨','🥩','🍗','🍜','🍱','🍙','🥠','🍦','🍰','🍩','🍪','🎂','🍫','🍭','🍬','🍯','🥛','🍵','🥤','🍶','🥢','🍽️','🍴','🥄'
        ];

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([29.4, -110.9], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            clusterGroup = L.markerClusterGroup({
                maxClusterRadius: 35,
                spiderfyOnMaxZoom: true,
                iconCreateFunction: (c) => L.divIcon({ html: '<div>'+c.getChildCount()+'</div>', className: 'marker-cluster-custom', iconSize: [40,40] })
            });
            map.addLayer(clusterGroup);

            // Generar Grid de Emojis
            const grid = document.getElementById('emoji-grid');
            EMOJI_LIST.forEach(emoji => {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.innerText = emoji;
                span.onclick = () => sendEmoji(emoji);
                grid.appendChild(span);
            });

            map.locate({ setView: false, watch: true, enableHighAccuracy: true });
            map.on('locationfound', e => {
                userPos = e.latlng;
                if (!userMarker) userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-dot' }) }).addTo(map);
                else userMarker.setLatLng(e.latlng);
                if (isFirstLoad) { map.panTo(e.latlng); isFirstLoad = false; }
            });

            document.getElementById('search-input').addEventListener('keypress', async (e) => {
                if(e.key === 'Enter') {
                    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(e.target.value)}&limit=1`);
                    const data = await res.json();
                    if(data.features.length) map.flyTo([data.features[0].geometry.coordinates[1], data.features[0].geometry.coordinates[0]], 17);
                }
            });

            loadData();
            setInterval(loadData, 10000);
        }

        function handleX() {
            if (userPos) map.panTo(userPos);
            document.getElementById('emoji-container').classList.add('active');
        }

        function closePanel() { document.getElementById('emoji-container').classList.remove('active'); }

        async function sendEmoji(emoji) {
            if(!userPos) return;
            const { error } = await _S.from('marcas').insert([{ 
                emoji, latitud: userPos.lat, longitud: userPos.lng, 
                expira_en: new Date(Date.now() + 259200000).toISOString() 
            }]);
            if (!error) { loadData(); closePanel(); }
        }

        async function loadData() {
            const { data } = await _S.from('marcas').select('*').gt('expira_en', new Date().toISOString());
            if (data) {
                let batch = [];
                data.forEach(m => {
                    if (!activeIds.has(m.id)) {
                        batch.push(L.marker([m.latitud, m.longitud], { icon: L.divIcon({ html: '<div style="font-size:32px">'+m.emoji+'</div>', className: 'p' }) }));
                        activeIds.add(m.id);
                    }
                });
                if (batch.length) clusterGroup.addLayers(batch);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
