<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA X</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Regla de oro: El contenedor DEBE tener altura o se verá blanco */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; }
        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // MÓDULO 1 Y 2 UNIFICADOS (KISS)
        function iniciarApp() {
            // Inicializar el mapa en un punto neutral (Caja 1)
            const map = L.map('map', { zoomControl: false }).setView([23.6, -102.5], 5);

            // Cargar las imágenes del mapa
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // GATILLO: La Decisión y la Acción (Caja 2)
            map.on('click', function(e) {
                const emoji = prompt("¿Qué pictograma quieres estampar?");
                if (emoji) {
                    L.marker(e.latlng, {
                        icon: L.divIcon({
                            className: 'sello',
                            html: `<div style="font-size:40px; margin-left:-20px; margin-top:-20px;">${emoji}</div>`,
                            iconSize: [0, 0]
                        })
                    }).addTo(map);
                }
            });

            // GPS: Mover a tu ubicación
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                });
            }
        }

        // Ejecutar cuando todo esté cargado
        window.onload = iniciarApp;
    </script>
</body>
</html>
