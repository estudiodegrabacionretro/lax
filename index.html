<script>
    function init() {
        // --- CAJA 1: EL ESCENARIO ---
        const map = L.map('map', {
            zoomControl: false,
            inertia: true,
            rotate: false
        }).setView([0, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- CAJA 2: LA DECISIÓN Y LA ACCIÓN ---
        // El Gatillo: Al aplastar la pantalla
        map.on('click', function(e) {
            // La Decisión: El panel de pictogramas (KISS: Usamos el teclado del sistema)
            const emoji = prompt("¿Qué pictograma quieres estampar aquí?");

            if (emoji) {
                // La Acción: Estampado inmediato
                L.marker(e.latlng, {
                    icon: L.divIcon({
                        className: 'emoji-marker',
                        html: `<div style="font-size:35px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));">${emoji}</div>`,
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    })
                }).addTo(map);
                // Misión cumplida.
            }
        });

        // Ubicación inicial
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            }, null, { enableHighAccuracy: true });
        }
    }

    window.onload = init;
</script>
