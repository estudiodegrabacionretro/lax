        #btn-x {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; background: #007bff; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; cursor: pointer; z-index: 10;
            box-shadow: 0 0 20px rgba(0,123,255,0.6); border: 4px solid #fff;
            transition: transform 0.2s;
        }
        #btn-x:active { transform: translateX(-50%) scale(0.9); }

        #emoji-container {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: #1a1a1a; z-index: 20; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 25px 25px 0 0; display: flex; flex-direction: column;
            color: white; border-top: 1px solid #333;
        }
        #emoji-container.active { bottom: 0; }

        .handle { width: 40px; height: 5px; background: #555; border-radius: 10px; margin: 12px auto; }
        
        #search-box { padding: 0 15px 10px; }
        #emoji-search {
            width: 100%; padding: 12px; border-radius: 10px; border: none;
            background: #333; color: white; font-size: 16px; outline: none;
        }

        #tabs {
            display: flex; overflow-x: auto; padding: 5px 10px; gap: 10px;
            border-bottom: 1px solid #333; scrollbar-width: none;
        }
        #tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 15px; border-radius: 20px; background: #333;
            white-space: nowrap; cursor: pointer; font-size: 14px;
        }
        .tab.active { background: #007bff; }

        #emoji-list {
            flex: 1; overflow-y: auto; padding: 15px;
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
            align-content: start;
        }
        .emoji-item {
            font-size: 32px; display: flex; align-items: center; justify-content: center;
            aspect-ratio: 1; cursor: pointer; border-radius: 10px;
        }
        .emoji-item:active { background: #333; }

        .p { background: none; border: none; }
