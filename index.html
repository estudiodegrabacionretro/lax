<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIAGNÓSTICO LA X</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #111; color: white; font-family: sans-serif; }
        #map { height: 100%; width: 100%; position: absolute; z-index: 1; }
        #debug-log { 
            position: absolute; top: 10px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; 
            font-size: 10px; padding: 10px; z-index: 9999; pointer-events: none;
            border: 1px solid #0f0; max-height: 150px; overflow-y: auto;
        }
        .error-msg { color: #ff4444; font-weight: bold; }
        .status-ui { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: black; padding: 10px; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="debug-log">Iniciando sistema de diagnóstico...<br></div>
    <div id="map"></div>
    <div class="status-ui" id="status-ui">Estado: Esperando...</div>

    <script>
        const log = (msg, isError = false) => {
            const div = document.getElementById('debug-log');
            div.innerHTML += `<span class="${isError ? 'error-msg' : ''}">${new Date().toLocaleTimeString()}: ${msg}</span><br>`;
            div.scrollTop = div.scrollHeight;
        };

        const _U = "https://echdpjhzjsaqtvdrkgaj.supabase.co";
        const _K = "sb_publishable_j_v0LqOm9jcYqh4NAH9IDg_dVoOVi8s";
        let map, _S;

        window.onerror = (msg) => log("ERROR GLOBAL: " + msg, true);

        async function start() {
            log("1. Conectando a Supabase...");
            try {
                _S = supabase.createClient(_U, _K);
                const { data, error } = await _S.from('marcas').select('id').limit(1);
                if (error) throw error;
                log("CONEXIÓN SUPABASE: OK");
            } catch (e) {
                log("FALLO SUPABASE: " + e.message, true);
                document.getElementById('status-ui').innerHTML = "Estado: ERROR SUPABASE";
            }

            log("2. Cargando Mapa (Leaflet)...");
            try {
                map = L.map('map', { zoomControl: false }).setView([29.4, -110.9], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                log("MAPA: OK");
            } catch (e) {
                log("FALLO MAPA: " + e.message, true);
            }

            log("3. Buscando GPS...");
            map.locate({ setView: true, maxZoom: 16 });
            map.on('locationfound', () => {
                log("GPS: LOCALIZADO");
                document.getElementById('status-ui').innerHTML = "Estado: GPS OK";
            });
            map.on('locationerror', (e) => {
                log("FALLO GPS: " + e.message, true);
                document.getElementById('status-ui').innerHTML = "Estado: ERROR GPS";
            });
        }

        window.onload = start;
    </script>
</body>
</html>
