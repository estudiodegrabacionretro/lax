    <style>

        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        #emoji-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.98); padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5); max-width: 90%; max-height: 250px;
            overflow-y: auto; z-index: 1000; border: 1px solid #bbb;
        }
        .emoji-category { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .category-title { font-weight: bold; font-size: 13px; margin-bottom: 6px; display: block; color: #555; text-transform: uppercase; }
        .emoji-item { cursor: pointer; font-size: 26px; padding: 6px; display: inline-block; transition: transform 0.1s; user-select: none; }
        .emoji-item:hover { transform: scale(1.3); background: #f0f0f0; border-radius: 8px; }
    </style>
</head>

let map;
let selectedEmoji = '📍';

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 29.089, lng: -110.961 },
        zoom: 13,
    });

    const panel = document.getElementById('emoji-panel');
    EMOJI_CATS.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'emoji-category';
        const title = document.createElement('span');
        title.className = 'category-title';
        title.innerText = cat.icon + ' ' + cat.label;
        div.appendChild(title);

        cat.emojis.forEach(emoji => {
            const span = document.createElement('span');
            span.className = 'emoji-item';
            span.innerText = emoji;
            span.onclick = () => { selectedEmoji = emoji; };
            div.appendChild(span);
        });
        panel.appendChild(div);
    });

    map.addListener("click", (e) => {
        new google.maps.Marker({
            position: e.latLng,
            map: map,
            label: { text: selectedEmoji, fontSize: '24px' }
        });
    });
}

window.onload = initMap;
