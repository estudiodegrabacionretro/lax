<script>
    function init() {
        // 1. EL ESCENARIO
        const map = L.map('map', {
            zoomControl: false,
            center: [23.6, -102.5], // México por default
            zoom: 5
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. LA DECISIÓN Y LA ACCIÓN (Caja Única)
        // Forzamos al mapa a escuchar el "aplastón"
        map.on('click', function(e) {
            console.log("Gatillo detectado en:", e.latlng); // Esto te confirma en consola que funciona
            
            // Invocamos el panel nativo
            const emoji = prompt("ESCRIBE TU EMOJI AQUÍ:");

            if (emoji && emoji.trim() !== "") {
                // El Estampado
                L.marker(e.latlng, {
                    icon: L.divIcon({
                        className: 'sello',
                        html: `<div style="font-size:40px; margin-top:-20px; margin-left:-10px;">${emoji}</div>`,
                        iconSize: [0, 0]
                    })
                }).addTo(map);
                alert("Pictograma estampado."); 
            }
        });

        // GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            });
        }
    }
    window.onload = init;
</script>
