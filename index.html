<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LA X - MODULO 1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Limpieza total de la interfaz */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #000; 
        }
        #map { 
            height: 100vh; width: 100vw; 
        }
        /* Ocultar atribuciones para inmersión total */
        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function init() {
            // Inicialización sin controles visuales
            const map = L.map('map', {
                zoomControl: false,
                inertia: true,
                inertiaDeceleration: 3000,
                worldCopyJump: true
            }).setView([0, 0], 2); // Vista global temporal

            // Capa estándar de OSM con nombres detallados
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Localización precisa
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        // Centrar en el usuario con nivel 12
                        map.setView([latitude, longitude], 12);
                    },
                    (err) => {
                        console.error("Error de GPS:", err);
                        // Fallback opcional si el GPS falla
                        map.setView([23.6345, -102.5528], 5); 
                    },
                    { enableHighAccuracy: true }
                );
            }
        }

        window.onload = init;
    </script>
</body>
</html>
