<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Una equis marcar√° el lugar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; }

        /* ORGANISMO X */
        #organismo-x {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }
        #organismo-x.bloqueado { pointer-events: none; opacity: 0.3; }
        #organismo-x.listo { pointer-events: auto; opacity: 1; cursor: pointer; }

        .la-x-primordial { position: relative; width: 50px; height: 50px; transition: transform 0.2s; }
        .la-x-primordial::before, .la-x-primordial::after {
            content: ''; position: absolute; background: #ff0000; border-radius: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }
        .la-x-primordial::before { top: 0; left: 22px; width: 6px; height: 50px; transform: rotate(45deg); }
        .la-x-primordial::after { top: 22px; left: 0; width: 50px; height: 6px; transform: rotate(45deg); }
        .listo .la-x-primordial { animation: respirar-x 3s ease-in-out infinite; }

        /* CONSOLA LIMPIA */
        #consola {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-radius: 30px 30px 0 0;
            z-index: 1000; transition: bottom 0.4s cubic-bezier(0.1, 0.8, 0.3, 1);
            display: flex; flex-direction: column; border-top: 1px solid rgba(255,255,255,0.1);
        }
        #consola.abierta { bottom: 0; }

        .consola-header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
        .consola-titulo { color: #fff; font-size: 14px; font-weight: 300; letter-spacing: 1px; }
        .btn-cerrar { color: #ff0000; font-size: 24px; cursor: pointer; }

        .emoji-grid {
            flex: 1; display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 10px; padding: 10px 20px; overflow-y: auto; align-content: start;
        }
        .emoji-item {
            font-size: 40px; text-align: center; cursor: pointer; padding: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .vanguardia { background: rgba(255, 0, 0, 0.1); border-radius: 15px; }

        .consola-nav {
            height: 85px; display: flex; justify-content: space-around;
            align-items: center; background: rgba(255, 255, 255, 0.02);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-tab { font-size: 32px; cursor: pointer; opacity: 0.2; transition: 0.3s; padding: 10px; }
        .nav-tab.active { opacity: 1; transform: scale(1.2); }

        @keyframes girar-nebulosa { 100% { transform: rotate(360deg); } }
        #halo-nebulosa {
            position: absolute; width: 75px; height: 75px; border-radius: 50%;
            border: 2px solid transparent; border-top: 3px solid #ff0000;
            animation: girar-nebulosa 0.8s linear infinite;
        }
        @keyframes respirar-x { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="organismo-x" class="bloqueado">
        <div id="halo-nebulosa"></div>
        <div class="la-x-primordial"></div>
    </div>

    <div id="consola">
        <div class="consola-header">
            <span class="consola-titulo">Una equis marcar√° el lugar</span>
            <span class="btn-cerrar" onclick="cerrarConsola()">вЬХ</span>
        </div>
        <div class="emoji-grid" id="grid-emojis"></div>
        <div class="consola-nav">
            <div class="nav-tab active" onclick="cambiarCategoria('caras', this)">рЯСљ</div>
            <div class="nav-tab" onclick="cambiarCategoria('naturaleza', this)">рЯМ≤</div>
            <div class="nav-tab" onclick="cambiarCategoria('objetos', this)">рЯЫЄ</div>
            <div class="nav-tab" onclick="cambiarCategoria('banderas', this)">рЯЗ™рЯЗ®</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://echdpjhzjsaqtvdrkgaj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjaGRwamh6anNhcXR2ZHJrZ2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTA2NTYsImV4cCI6MjA4ODk4NjY1Nn0.8_E_jXsoA8JSgQ-PSNRNc-vqePqFeEDWHiy5YFgc8oo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map;

        const VANGUARDIA = {
            "caras": ['рЯСљ', 'рЯТА', 'рЯ§°', 'рЯСЇ', 'рЯСї', 'рЯ§Ц', 'рЯСЊ', 'рЯ§Ѓ', 'рЯ§ѓ', 'рЯ§Ђ', 'рЯТ©', 'рЯСБпЄП', 'рЯІ†', 'рЯС£', 'рЯС§', 'рЯІСвАНвЪХпЄП'],
            "naturaleza": ['рЯМ≤', 'рЯМµ', 'рЯНД', 'рЯМЛ', 'рЯМ™пЄП', 'вШДпЄП', 'рЯМС', 'вШАпЄП', 'рЯРЊ', 'рЯ¶М', 'рЯРН', 'рЯ¶Е', 'и†Н', 'рЯ¶Б', 'рЯ¶Ц', 'рЯ¶†'],
            "objetos": ['рЯЫЄ', 'рЯЪА', 'рЯЫ∞пЄП', 'рЯФ≠', 'рЯУ°', 'рЯФЛ', 'рЯУ±', 'рЯТї', 'рЯФЂ', 'рЯТ£', 'вЪФпЄП', 'рЯТЙ', 'рЯТК', 'рЯІђ', 'рЯІ™', 'рЯ©є'],
            "banderas": ['рЯЗ™рЯЗ®', 'рЯЗ≤рЯЗљ', 'рЯЗЇрЯЗЄ', 'рЯЪ©', 'рЯПБ', 'вЪ†пЄП', 'рЯЪЂ', 'рЯЖШ', 'рЯПівАНвШ†пЄП', 'рЯПі', 'рЯП≥пЄП', 'рЯОМ', 'вЪІпЄП', 'вЪІ', 'вШЄпЄП', 'вШ£пЄП']
        };

        const RANGOS = {
            "caras": [0x1F600, 0x1F64F],
            "naturaleza": [0x1F300, 0x1F32F],
            "objetos": [0x1F680, 0x1F6FF],
            "banderas": [0x1F1E6, 0x1F1FF]
        };

        async function init() {
            map = L.map('map', { zoomControl: false, center: [-1.83, -78.18], zoom: 7 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            const { data } = await _supabase.from('marcas').select('*');
            if (data) data.forEach(m => estamparEnMapa(m.latitud, m.longitud, m.emoji));

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    map.flyTo([p.coords.latitude, p.coords.longitude], 16);
                    activarOrganismo();
                }, activarOrganismo);
            }

            document.getElementById('organismo-x').onclick = () => {
                document.getElementById('consola').classList.add('abierta');
                cambiarCategoria('caras', document.querySelector('.nav-tab'));
            };
        }

        function cambiarCategoria(cat, elemento) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            elemento.classList.add('active');
            const grid = document.getElementById('grid-emojis');
            grid.innerHTML = '';
            
            VANGUARDIA[cat].forEach(emoji => crearDiv(emoji, grid, true));

            const [inicio, fin] = RANGOS[cat];
            for (let i = inicio; i <= fin; i++) {
                const emoji = String.fromCodePoint(i);
                if (!VANGUARDIA[cat].includes(emoji)) crearDiv(emoji, grid, false);
            }
        }

        function crearDiv(emoji, contenedor, esVan) {
            const div = document.createElement('div');
            div.className = esVan ? 'emoji-item vanguardia' : 'emoji-item';
            div.innerText = emoji;
            div.onclick = () => seleccionarEmoji(emoji);
            if (div.innerText.trim() !== "") contenedor.appendChild(div);
        }

        async function seleccionarEmoji(emoji) {
            const centro = map.getCenter();
            cerrarConsola();
            estamparEnMapa(centro.lat, centro.lng, emoji);
            await _supabase.from('marcas').insert([{ latitud: centro.lat, longitud: centro.lng, emoji: emoji }]);
        }

        function cerrarConsola() { document.getElementById('consola').classList.remove('abierta'); }
        function activarOrganismo() { 
            const halo = document.getElementById('halo-nebulosa');
            if (halo) halo.style.display = 'none';
            document.getElementById('organismo-x').classList.replace('bloqueado', 'listo');
        }

        function estamparEnMapa(lat, lng, emoji) {
            L.marker([lat, lng], {
                icon: L.divIcon({ className: 'sello', html: `<div style="font-size:45px; transform: translate(-50%, -50%);">${emoji}</div>`, iconSize: [0, 0] })
            }).addTo(map);
        }

        window.onload = init;
    </script>
</body>
</html>
