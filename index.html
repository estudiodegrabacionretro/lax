    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #map { position: absolute; inset: 0; z-index: 1; background: #111; }

        #btn-x {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 75px; height: 75px; background: #007bff; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 35px; font-weight: bold; cursor: pointer; z-index: 10;
            box-shadow: 0 0 20px rgba(0,123,255,0.5); border: 3px solid #fff;
        }

        #emoji-container {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: #1c1c1e; z-index: 20; transition: bottom 0.3s ease;
            border-radius: 20px 20px 0 0; display: flex; flex-direction: column; color: white;
        }
        #emoji-container.active { bottom: 0; }

        .handle { width: 40px; height: 5px; background: #3a3a3c; border-radius: 10px; margin: 12px auto; }
        #search-box { padding: 5px 15px 10px; }
        #emoji-search { width: 100%; padding: 10px; border-radius: 10px; border: none; background: #2c2c2e; color: white; font-size: 16px; outline: none; box-sizing: border-box; }

        #tabs { display: flex; overflow-x: auto; padding: 5px 10px; gap: 8px; border-bottom: 1px solid #2c2c2e; scrollbar-width: none; }
        #tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 14px; border-radius: 15px; background: #2c2c2e; white-space: nowrap; cursor: pointer; font-size: 14px; color: #8e8e93; }
        .tab.active { background: #007bff; color: white; }

        #emoji-list { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; align-content: start; }
        .emoji-item { font-size: 32px; text-align: center; cursor: pointer; }
        .custom-div-icon { background: none; border: none; text-align: center; }
    </style>

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([23, -102], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            clusterGroup = L.markerClusterGroup({ showCoverageOnHover: false });
            map.addLayer(clusterGroup);

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    if (!window.uM) {
                        window.uM = L.circleMarker([userPos.lat, userPos.lng], { radius: 7, color: '#fff', fillColor: '#007bff', fillOpacity: 1 }).addTo(map);
                        map.setView([userPos.lat, userPos.lng], 15);
                    } else { window.uM.setLatLng([userPos.lat, userPos.lng]); }
                }, null, { enableHighAccuracy: true });
            }

            document.getElementById('btn-x').onclick = () => document.getElementById('emoji-container').classList.add('active');
            document.getElementById('emoji-search').oninput = (e) => buildEmojiPanel(e.target.value);

            buildTabs();
            buildEmojiPanel();
            loadData();
            setInterval(loadData, 8000);
        }

        function buildTabs() {
            const t = document.getElementById('tabs');
            t.innerHTML = '';
            EMOJI_CATS.forEach(c => {
                const div = document.createElement('div');
                div.className = `tab ${c.label === currentTabLabel ? 'active' : ''}`;
                div.innerText = `${c.icon} ${c.label}`;
                div.onclick = () => {
                    currentTabLabel = c.label;
                    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                    div.classList.add('active');
                    buildEmojiPanel();
                };
                t.appendChild(div);
            });
        }

        function buildEmojiPanel(filter = '') {
            const l = document.getElementById('emoji-list');
            l.innerHTML = '';
            let list = [];
            if (filter) {
                EMOJI_CATS.forEach(c => list.push(...c.emojis));
                list = [...new Set(list)].filter(e => e.includes(filter));
            } else {
                const cat = EMOJI_CATS.find(c => c.label === currentTabLabel);
                list = cat ? cat.emojis : [];
            }
            list.forEach(e => {
                const span = document.createElement('span');
                span.className = 'emoji-item';
                span.innerText = e;
                span.onclick = () => sendEmoji(e);
                l.appendChild(span);
            });
        }

        async function sendEmoji(emoji) {
            if (!userPos) return;
            const { error } = await _S.from('marcas').insert([{
                emoji, latitud: userPos.lat, longitud: userPos.lng,
                expira_en: new Date(Date.now() + 259200000).toISOString()
            }]);
            if (!error) { loadData(); closePanel(); }
        }
