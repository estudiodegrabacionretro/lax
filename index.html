<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interactivo Universal</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; background: #ccdbe3; }
        
        #emoji-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 95%; max-height: 250px;
            overflow-y: auto; z-index: 1000; border: 1px solid #ddd;
            backdrop-filter: blur(5px);
        }

        .emoji-category { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .category-title { 
            font-weight: bold; font-size: 11px; color: #666; 
            display: block; margin-bottom: 8px; text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .emoji-grid { display: flex; flex-wrap: wrap; gap: 5px; }
        
        .emoji-item { 
            cursor: pointer; font-size: 26px; width: 42px; height: 42px; 
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.1s, background 0.2s; border-radius: 8px;
            user-select: none;
        }

        .emoji-item:hover { transform: scale(1.2); background: #f0f0f0; }
        .emoji-item.active { background: #e0e0e0; box-shadow: inset 0 0 5px rgba(0,0,0,0.1); }

        /* Scrollbar estética */
        #emoji-panel::-webkit-scrollbar { width: 6px; }
        #emoji-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="emoji-panel"></div>
