<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Una equis marcará el lugar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; position: absolute; z-index: 1; }

        /* Contenedor del Organismo */
        #organismo-x {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        /* ESTADO BLOQUEADO */
        #organismo-x.bloqueado {
            pointer-events: none;
            opacity: 0.3;
        }

        /* ESTADO LISTO */
        #organismo-x.listo {
            pointer-events: auto;
            opacity: 1;
        }

        /* LA NEBULOSA */
        #halo-nebulosa {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 3px solid #ff0000;
            filter: blur(1px);
            animation: girar-nebulosa 0.8s linear infinite;
        }

        @keyframes girar-nebulosa {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* LA X PRIMORDIAL */
        .la-x-primordial {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .la-x-primordial::before,
        .la-x-primordial::after {
            content: '';
            position: absolute;
            background: #ff0000;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        .la-x-primordial::before { top: 0; left: 22px; width: 6px; height: 50px; transform: rotate(45deg); }
        .la-x-primordial::after { top: 22px; left: 0; width: 50px; height: 6px; transform: rotate(45deg); }

        /* Animación de Respiración */
        .listo .la-x-primordial {
            animation: respirar-x 3s ease-in-out infinite;
        }

        @keyframes respirar-x {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px red); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 15px red); }
        }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div id="organismo-x" class="bloqueado">
        <div id="halo-nebulosa"></div>
        <div class="la-x-primordial"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://echdpjhzjsaqtvdrkgaj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjaGRwamh6anNhcXR2ZHJrZ2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTA2NTYsImV4cCI6MjA4ODk4NjY1Nn0.8_E_jXsoA8JSgQ-PSNRNc-vqePqFeEDWHiy5YFgc8oo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map;

        // 1. Variables de Control
        const JITTER_FACTOR = 0.0005;

        // 2. Función de Procesamiento de Coordenadas
        function generarCoordenadasInmutables(lat, lng) {
            const offsetLat = (Math.random() * 2 - 1) * JITTER_FACTOR;
            const offsetLng = (Math.random() * 2 - 1) * JITTER_FACTOR;
            
            return {
                lat_render: lat + offsetLat,
                lng_render: lng + offsetLng,
                lat_origen: lat,
                lng_origen: lng
            };
        }

        async function init() {
            map = L.map('map', { zoomControl: false, center: [23.6, -102.5], zoom: 5 });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // 1. Carga con Debug
            const { data: marcas, error: loadError } = await _supabase.from('marcas').select('*');
            
            if (loadError) {
                alert("Error cargando: " + loadError.message);
                console.error(loadError);
            }
            
            if (marcas) {
                console.log("Marcas recuperadas:", marcas.length);
                marcas.forEach(m => {
                    // Mapeo flexible: intenta render, luego latitud (imagen), luego lat
                    const lta = m.lat_render || m.latitud || m.lat;
                    const lng = m.lng_render || m.longitud || m.lng;
                    
                    if (lta && lng) {
                        estamparEnMapa(lta, lng, m.emoji);
                    }
                });
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const lat = p.coords.latitude;
                    const lng = p.coords.longitude;
                    map.flyTo([lat, lng], 16, { duration: 2 });
                    map.once('moveend', activarOrganismo);
                }, () => setTimeout(activarOrganismo, 5000));
            }

            // 2. Inserción con Verificación Exhaustiva
            document.getElementById('organismo-x').addEventListener('click', async () => {
                const emoji = prompt("¿Qué pictograma vas a estampar?");
                if (emoji && emoji.trim() !== "") {
                    const centro = map.getCenter();
                    const coords = generarCoordenadasInmutables(centro.lat, centro.lng);
                    
                    const payload = { 
                        lat_render: coords.lat_render, 
                        lng_render: coords.lng_render, 
                        lat_origen: coords.lat_origen, 
                        lng_origen: coords.lng_origen,
                        latitud: coords.lat_origen,   // Coincide con tu imagen
                        longitud: coords.lng_origen,  // Coincide con tu imagen
                        emoji: emoji 
                    };

                    const { error: insertError } = await _supabase.from('marcas').insert([payload]);
                    
                    if (insertError) {
                        alert("Error al guardar: " + insertError.message);
                        console.error("Detalle:", insertError);
                    } else {
                        estamparEnMapa(coords.lat_render, coords.lng_render, emoji);
                    }
                }
            });
        }

        function activarOrganismo() {
            const org = document.getElementById('organismo-x');
            const halo = document.getElementById('halo-nebulosa');
            if (halo) halo.style.display = 'none';
            org.classList.replace('bloqueado', 'listo');
        }

        function estamparEnMapa(lat, lng, emoji) {
            L.marker([lat, lng], {
                icon: L.divIcon({
                    className: 'sello',
                    html: `<div style="font-size:40px; transform: translate(-50%, -50%); text-align:center;">${emoji}</div>`,
                    iconSize: [0, 0]
                })
            }).addTo(map);
        }

        window.onload = init;
    </script>
</body>
</html>
