        #addr-input { width: 100%; padding: 14px; border-radius: 12px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4); outline: none; font-size: 16px; background: rgba(255,255,255,0.9); }

        #emoji-container {

            border-radius: 24px 24px 0 0;
            display: flex; flex-direction: column;

        #emoji-container.active { bottom: 0; }

        .panel-handle { width: 44px; height: 5px; background: #2e4070; border-radius: 3px; margin: 12px auto 8px; flex-shrink: 0; }

        #emoji-search {
            margin: 0 12px 8px; padding: 12px;
            border-radius: 12px; border: none;
            background: #0f172a; color: white;
            font-size: 16px; outline: none;
        }

        #cat-tabs {
            display: flex; overflow-x: auto; padding: 5px 10px;
            border-bottom: 1px solid #1e3060; gap: 15px; scrollbar-width: none;

        #cat-tabs::-webkit-scrollbar { display: none; }
        .cat-tab { font-size: 1.6rem; cursor: pointer; opacity: 0.5; padding-bottom: 8px; transition: 0.2s; flex-shrink: 0; }

        #emoji-scroll { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .emoji-item { font-size: 2rem; text-align: center; padding: 10px 0; cursor: pointer; user-select: none; }
        .emoji-item:active { transform: scale(1.4); background: rgba(59, 130, 246, 0.3); border-radius: 12px; }

        .marker-cluster-custom { background: #0f172a; border: 2px solid #3b82f6; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        function init() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([29.4, -110.9], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            clusterGroup = L.markerClusterGroup({
                maxClusterRadius: 35,
                iconCreateFunction: (c) => L.divIcon({ html: '<div>'+c.getChildCount()+'</div>', className: 'marker-cluster-custom', iconSize: [40,40] })
            });
            map.addLayer(clusterGroup);

            renderTabs();
            renderEmojis('', 'Frecuentes');

            map.locate({ setView: false, watch: true, enableHighAccuracy: true });
            map.on('locationfound', e => {
                userPos = e.latlng;
                if (!userMarker) userMarker = L.marker(e.latlng, { icon: L.divIcon({ className: 'user-dot' }) }).addTo(map);
                else userMarker.setLatLng(e.latlng);
                if (isFirstLoad) { map.flyTo(e.latlng, 16); isFirstLoad = false; }
            });

            // Buscador de direcciones
            document.getElementById('addr-input').addEventListener('keypress', async (e) => {
                if(e.key === 'Enter') {
                    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(e.target.value)}&limit=1`);
                    const data = await res.json();
                    if(data.features.length) {
                        const c = data.features[0].geometry.coordinates;
                        map.flyTo([c[1], c[0]], 17);
                    }
                }
            });

            // Buscador de emojis corregido
            document.getElementById('emoji-search').addEventListener('input', (e) => {
                renderEmojis(e.target.value);
            });

            loadData();
            setInterval(loadData, 12000);
        }

        function renderTabs() {
            const tabs = document.getElementById('cat-tabs');
            EMOJI_CATS.forEach((cat, i) => {
                const span = document.createElement('span');
                span.className = 'cat-tab' + (i === 0 ? ' active' : '');
                span.innerText = cat.icon;
                span.onclick = () => {
                    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                    span.classList.add('active');
                    renderEmojis('', cat.label);
                };
                tabs.appendChild(span);
            });
        }
